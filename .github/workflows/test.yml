name: FASTR Functionality Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Pixi
      uses: prefix-dev/setup-pixi@v0.4.1
      with:
        pixi-version: v0.19.0
        cache: true
    
    - name: Cache test data
      uses: actions/cache@v4
      with:
        path: app/bwa-mem2/test_data
        key: fastr-test-data-v1-${{ hashFiles('app/bwa-mem2/test_data/*.gz') }}
        restore-keys: |
          fastr-test-data-v1-
    
    - name: Install dependencies
      run: pixi install
    
    - name: Setup test data
      run: bash app/bwa-mem2/setup_test_data.sh
    
    - name: Verify FASTQ pairing
      run: pixi run verify-pairing
    
    - name: Test FASTR conversion (bug fix verification)
      run: pixi run verify-fastr-conversion
    
    - name: Run unit tests
      run: pixi run test-unit
      continue-on-error: true
